name: Build and Push Spring Boot to Docker Hub

# Kích hoạt workflow khi có thao tác Push lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Action lấy code từ Github
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Action Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 3: Action Đóng gói & Đẩy Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tự động lấy username từ secret, bạn chỉ cần thay "my-spring-boot-app" thành tên app của bạn
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:latest
