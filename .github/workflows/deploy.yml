name: Build and Push Spring Boot to Docker Hub

on: 
  push:
    branches: [ "main" ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Sửa từ 17 thành 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4 # Khuyên dùng v4 cho các bản Java mới
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'webcinema' bằng tên repo thực tế của bạn
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/webcinema:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/webcinema:v${{ github.run_number }}
      
      - name: Triển khai lên DevOps Classroom
        run: |
          # Sửa lại đúng tên repo bạn đã nhập trên web
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/webcinema"
          
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP Status: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Kiểm tra log bên dưới."
            echo "::group::Chi tiết lỗi từ Server"
            echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
